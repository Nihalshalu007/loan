name: Restore Site at 11AM IST

on:
  schedule:
    # 12:55 AM IST = 07:25 PM UTC — retest
    - cron: '25 19 * * *'
  workflow_dispatch:

jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Restore original index.html
        run: |
          if [ -f index_backup.html ]; then
            mv index_backup.html index.html
            echo "✅ Restored index.html from backup"
          else
            echo "⚠️ No backup file found — skipping"
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html index_backup.html || true
          git diff --cached --quiet || git commit -m "chore: restore site after maintenance (v3.3 live)"
          git push
